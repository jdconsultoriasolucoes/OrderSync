<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — OrderSync</title>
  <meta name="description" content="Configurações do Representante — OrderSync" />

  <!-- Design System -->
  <link rel="stylesheet" href="../design-system.css" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/imask"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar_control.js"></script>

  <style>
    .profile-main {
      margin-left: 0;
      padding: 24px;
      padding-top: calc(var(--os-header-height) + 24px);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .profile-card {
      background: var(--os-bg-card);
      border: 1px solid var(--os-border);
      border-radius: 16px;
      padding: 40px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--os-border);
    }

    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
      font-weight: 700;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .profile-info h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--os-text-primary);
      margin: 0;
    }

    .profile-info p {
      font-size: 0.85rem;
      color: var(--os-text-muted);
      margin: 4px 0 0 0;
    }

    .profile-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 6px;
    }

    .badge-admin {
      background: rgba(239, 68, 68, 0.1);
      color: #dc2626;
    }

    .badge-gerente {
      background: rgba(245, 158, 11, 0.1);
      color: #d97706;
    }

    .badge-vendedor {
      background: rgba(16, 185, 129, 0.1);
      color: #059669;
    }

    .profile-section {
      margin-bottom: 28px;
    }

    .profile-section h2 {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--os-text-muted);
      margin-bottom: 16px;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .profile-grid.full {
      grid-template-columns: 1fr;
    }

    .profile-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .profile-field label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--os-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .profile-field input {
      padding: 10px 14px;
      border: 1px solid var(--os-border);
      border-radius: 8px;
      font-size: 0.9rem;
      color: var(--os-text-primary);
      background: var(--os-bg-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .profile-field input:focus {
      outline: none;
      border-color: var(--os-primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .profile-field input:disabled {
      background: var(--os-bg-secondary);
      color: var(--os-text-secondary);
      cursor: not-allowed;
    }

    .profile-actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--os-border);
    }

    .btn-profile {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn-profile-edit {
      background: var(--os-primary);
      color: white;
    }

    .btn-profile-edit:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-profile-save {
      background: #059669;
      color: white;
      display: none;
    }

    .btn-profile-save:hover {
      background: #047857;
      transform: translateY(-1px);
    }

    .btn-profile-cancel {
      background: var(--os-bg-secondary);
      color: var(--os-text-secondary);
      display: none;
    }

    .btn-profile-cancel:hover {
      background: #e2e8f0;
    }

    .profile-status {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-top: 12px;
      display: none;
    }

    .status-success {
      background: rgba(16, 185, 129, 0.1);
      color: #059669;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .status-error {
      background: rgba(239, 68, 68, 0.1);
      color: #dc2626;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    @media (max-width: 600px) {
      .profile-grid {
        grid-template-columns: 1fr;
      }

      .profile-card {
        padding: 24px;
      }
    }
  </style>
</head>

<body>
  <script>
    if (window.Auth) window.Auth.checkAuth();
  </script>

  <!-- ========== HEADER ========== -->
  <header class="os-header">
    <button class="os-menu-btn" id="menu-button" aria-label="Menu">&#9776;</button>
    <img src="/logo.png" alt="Logo" class="os-logo" style="height: 36px; max-width: 100%; object-fit: contain;" />
    <span class="os-header-title">Profile</span>
  </header>

  <!-- ========== SIDEBAR ========== -->
  <nav class="os-sidebar" id="sidebar">
    <div class="os-sidebar-section">Menu</div>
    <ul>
      <li><a href="/index.html">
          <svg class="os-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg> Home
        </a></li>
      <li><a href="/clientes/cliente.html">
          <svg class="os-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
          </svg> Clientes
        </a></li>
      <li><a href="/pedido/pedido.html">
          <svg class="os-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
          </svg> Consultar Pedidos
        </a></li>
    </ul>
    <div class="os-sidebar-section">Sistema</div>
    <ul>
      <li><a href="/profile/profile.html" class="active">
          <svg class="os-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg> Profile
        </a></li>
      <li><a href="/usuarios.html">
          <svg class="os-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg> Usuários
        </a></li>
      <li><a href="#" onclick="window.Auth.openChangePasswordModal()">
          <svg class="os-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg> Trocar Senha
        </a></li>
      <li><a href="#" onclick="window.Auth.logout()">
          <svg class="os-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg> Sair
        </a></li>
    </ul>
  </nav>
  <div class="os-sidebar-overlay" id="overlay"></div>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="profile-main">
    <div class="profile-card">

      <!-- Header com Avatar -->
      <div class="profile-header">
        <div class="profile-avatar" id="profile-avatar">?</div>
        <div class="profile-info">
          <h1 id="profile-user-name">Carregando...</h1>
          <p id="profile-user-email">—</p>
          <span class="profile-badge badge-vendedor" id="profile-user-role">—</span>
        </div>
      </div>

      <!-- Seção: Dados do Representante -->
      <div class="profile-section">
        <h2>Dados do Representante</h2>
        <div class="profile-grid">
          <div class="profile-field">
            <label for="pf-codigo">Código de Representante</label>
            <input type="text" id="pf-codigo" disabled />
          </div>
          <div class="profile-field">
            <label for="pf-cnpj">CNPJ</label>
            <input type="text" id="pf-cnpj" disabled />
          </div>
        </div>
        <div class="profile-grid full" style="margin-top: 16px;">
          <div class="profile-field">
            <label for="pf-razao">Razão Social</label>
            <input type="text" id="pf-razao" disabled />
          </div>
        </div>
        <div class="profile-grid full" style="margin-top: 16px;">
          <div class="profile-field">
            <label for="pf-endereco">Endereço</label>
            <input type="text" id="pf-endereco" disabled />
          </div>
        </div>
      </div>

      <!-- Status Message -->
      <div class="profile-status" id="profile-status"></div>

      <!-- Ações -->
      <div class="profile-actions">
        <button class="btn-profile btn-profile-edit" id="btn-edit" onclick="habilitarEdicao()">Editar</button>
        <button class="btn-profile btn-profile-save" id="btn-save" onclick="salvarProfile()">Salvar</button>
        <button class="btn-profile btn-profile-cancel" id="btn-cancel" onclick="cancelarEdicao()">Cancelar</button>
      </div>
    </div>
  </main>

  <script>
    const API = window.API_BASE || 'http://127.0.0.1:8000';
    let isAdmin = false;
    let dadosOriginal = {};

    // Máscara CNPJ
    const cnpjInput = document.getElementById('pf-cnpj');
    if (cnpjInput) IMask(cnpjInput, { mask: '00.000.000/0000-00' });

    // --- Carregar dados do usuário logado ---
    async function carregarUsuario() {
      try {
        const token = window.Auth ? window.Auth.getToken() : localStorage.getItem('ordersync_token');
        if (!token) return;

        // Decodifica JWT para obter dados do usuário
        const payload = JSON.parse(atob(token.split('.')[1]));
        const nome = payload.nome || payload.sub || 'Usuário';
        const email = payload.sub || '';
        const role = payload.role || 'vendedor';

        document.getElementById('profile-user-name').textContent = nome;
        document.getElementById('profile-user-email').textContent = email;

        // Avatar: iniciais
        const iniciais = nome.split(' ').map(n => n[0]).slice(0, 2).join('').toUpperCase();
        document.getElementById('profile-avatar').textContent = iniciais || '?';

        // Badge de role
        const badge = document.getElementById('profile-user-role');
        badge.textContent = role.charAt(0).toUpperCase() + role.slice(1);
        badge.className = `profile-badge badge-${role}`;

        // Verifica se é admin
        isAdmin = (role === 'admin');

        // Oculta botão Editar se não for admin
        if (!isAdmin) {
          document.getElementById('btn-edit').style.display = 'none';
        }
      } catch (e) {
        console.error('Erro ao decodificar token:', e);
      }
    }

    // --- Carregar dados do profile ---
    async function carregarProfile() {
      try {
        const token = window.Auth ? window.Auth.getToken() : localStorage.getItem('ordersync_token');
        const res = await fetch(`${API}/profile-config/`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Erro ao carregar profile');
        const data = await res.json();

        document.getElementById('pf-codigo').value = data.codigo_representante || '';
        document.getElementById('pf-cnpj').value = data.cnpj || '';
        document.getElementById('pf-razao').value = data.razao_social || '';
        document.getElementById('pf-endereco').value = data.endereco || '';

        dadosOriginal = { ...data };
      } catch (e) {
        console.error('Erro ao carregar profile:', e);
      }
    }

    function habilitarEdicao() {
      if (!isAdmin) {
        mostrarStatus('Apenas administradores podem editar.', 'error');
        return;
      }
      document.querySelectorAll('.profile-field input').forEach(el => el.disabled = false);
      document.getElementById('btn-edit').style.display = 'none';
      document.getElementById('btn-save').style.display = 'inline-block';
      document.getElementById('btn-cancel').style.display = 'inline-block';
    }

    function cancelarEdicao() {
      document.querySelectorAll('.profile-field input').forEach(el => el.disabled = true);
      document.getElementById('btn-edit').style.display = 'inline-block';
      document.getElementById('btn-save').style.display = 'none';
      document.getElementById('btn-cancel').style.display = 'none';

      // Restaurar valores originais
      document.getElementById('pf-codigo').value = dadosOriginal.codigo_representante || '';
      document.getElementById('pf-cnpj').value = dadosOriginal.cnpj || '';
      document.getElementById('pf-razao').value = dadosOriginal.razao_social || '';
      document.getElementById('pf-endereco').value = dadosOriginal.endereco || '';
    }

    async function salvarProfile() {
      try {
        const token = window.Auth ? window.Auth.getToken() : localStorage.getItem('ordersync_token');
        const dados = {
          codigo_representante: document.getElementById('pf-codigo').value.trim(),
          cnpj: document.getElementById('pf-cnpj').value.trim(),
          razao_social: document.getElementById('pf-razao').value.trim(),
          endereco: document.getElementById('pf-endereco').value.trim()
        };

        const res = await fetch(`${API}/profile-config/`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(dados)
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Erro ao salvar');
        }

        dadosOriginal = { ...dados };
        document.querySelectorAll('.profile-field input').forEach(el => el.disabled = true);
        document.getElementById('btn-edit').style.display = 'inline-block';
        document.getElementById('btn-save').style.display = 'none';
        document.getElementById('btn-cancel').style.display = 'none';

        mostrarStatus('Dados salvos com sucesso!', 'success');
      } catch (e) {
        mostrarStatus(e.message, 'error');
      }
    }

    function mostrarStatus(msg, tipo) {
      const el = document.getElementById('profile-status');
      el.textContent = msg;
      el.className = `profile-status status-${tipo}`;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    // Inicialização
    window.addEventListener('load', () => {
      carregarUsuario();
      carregarProfile();
    });
  </script>
</body>

</html>
