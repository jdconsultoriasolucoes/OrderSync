<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientes Sem Código - OrderSync</title>

    <!-- Design System -->
    <link rel="stylesheet" href="../design-system.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/sidebar_control.js"></script>
</head>
<body>
    <script>
        if (window.Auth) {
            window.Auth.checkAuth();
        }
    </script>

    <!-- ========== HEADER ========== -->
    <header class="os-header">
        <button class="os-menu-btn" id="menu-button" aria-label="Menu">&#9776;</button>
        <img src="logo.png" alt="Logo" class="os-logo" onerror="this.src='/logo.png';" />
        <span class="os-header-title">Clientes Sem Código</span>
    </header>

    <nav class="os-sidebar" id="sidebar">
        <div class="os-sidebar-section">Menu</div>
        <ul>
            <li><a href="../../index.html">
                    <svg class="os-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg> Home
                </a></li>
        </ul>
    </nav>
    <div class="os-sidebar-overlay" id="overlay"></div>

    <!-- ========== MAIN ========== -->
    <div class="os-page-container" style="padding: var(--os-space-4); padding-top: calc(var(--os-header-height) + var(--os-space-4));">
        <section class="os-card">
            <div class="os-card-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h3 class="os-card-title">Relatório: Clientes Sem Código da Empresa</h3>
                <a href="../../index.html" class="os-btn os-btn-secondary">Voltar ao Painel</a>
            </div>

            <div class="os-table-wrap" style="margin-top: var(--os-space-4);">
                <table id="tabela-clientes-sem-codigo" class="os-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome do Cliente</th>
                            <th>CNPJ / CPF</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="3" style="text-align:center;">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Loader Script -->
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            try {
                const apiBase = (window.API_BASE || "") + "/api/dashboard";
                const token = localStorage.getItem("ordersync_token");

                const response = await fetch(`${apiBase}/clientes_sem_codigo`, {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error("Erro ao carregar clientes sem código");
                }

                const data = await response.json();
                const tbody = document.querySelector("#tabela-clientes-sem-codigo tbody");
                tbody.innerHTML = "";
                
                if (data.clientes && data.clientes.length > 0) {
                    data.clientes.forEach(c => {
                        const tr = document.createElement("tr");
                        
                        const tdId = document.createElement("td");
                        tdId.textContent = c.id || "N/A";
                        
                        const tdNome = document.createElement("td");
                        tdNome.textContent = c.cadastro_nome_cliente || "N/A";
                        
                        const tdDoc = document.createElement("td");
                        tdDoc.textContent = c.cadastro_cnpj || c.cadastro_cpf || "N/A";
                        
                        tr.appendChild(tdId);
                        tr.appendChild(tdNome);
                        tr.appendChild(tdDoc);
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = "<tr><td colspan='3' style='text-align:center;'>Nenhum cliente encontrado.</td></tr>";
                }
            } catch (error) {
                console.error(error);
                const tbody = document.querySelector("#tabela-clientes-sem-codigo tbody");
                if(tbody) tbody.innerHTML = "<tr><td colspan='3' style='text-align:center;color:red;'>Erro ao carregar dados.</td></tr>";
            }
        });
    </script>
</body>
</html>
