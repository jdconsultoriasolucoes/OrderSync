<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inserir Produtos — OrderSync</title>

  <!-- Design System -->
  <link rel="stylesheet" href="../design-system.css">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Page CSS -->
  <link rel="stylesheet" href="tabela_preco.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar_control.js"></script>
</head>

<body>

  <!-- ========== HEADER ========== -->
  <header class="os-header">
    <button class="os-menu-btn" id="menu-button" aria-label="Menu">&#9776;</button>
    <img src="../logo.png" alt="Logo" class="os-logo" />
    <span class="os-header-title">Inserir Produtos</span>
  </header>

  <!-- ========== SIDEBAR ========== -->
  <nav class="os-sidebar" id="sidebar">
    <div class="os-sidebar-section">Menu</div>
    <ul>
      <li><a href="../../index.html">Home</a></li>
      <li><a href="../clientes/cliente.html">Clientes</a></li>
      <li><a href="../gerenciar_tabelas/gerenciar_tabelas.html">Atualizar Catálogo</a></li>
      <li><a href="../pedido/pedido.html">Consultar Pedidos</a></li>
      <li><a href="../tabela_preco/criacao_tabela_preco.html" class="active">Tabela Preço</a></li>
      <li><a href="../produto/produto.html">Produtos</a></li>
    </ul>
    <div class="os-sidebar-section">Sistema</div>
    <ul>
      <li><a href="../usuarios.html">Usuários</a></li>
      <li><a href="../config_email/config_email.html">Configuração E-mail</a></li>
      <li><a href="#" onclick="window.Auth.openChangePasswordModal()">Trocar Senha</a></li>
      <li><a href="#" onclick="window.Auth.logout()">Sair</a></li>
    </ul>
  </nav>
  <div class="os-sidebar-overlay" id="overlay"></div>

  <div class="os-page-container"
    style="padding: var(--os-space-4); padding-top: calc(var(--os-header-height) + var(--os-space-4));">

    <!-- Filtros mínimos (somente Grupo) -->
    <section class="os-card" style="margin-bottom: var(--os-space-4);">
      <div id="toolbar-filtros" class="os-toolbar"
        style="display: flex; gap: var(--os-space-3); flex-wrap: wrap; align-items: flex-end;">
        <div class="os-form-group" style="margin-bottom: 0;">
          <label class="os-label" for="grupo">Grupo:</label>
          <select id="grupo" class="os-select"></select>
        </div>

        <div class="os-form-group" style="margin-bottom: 0;">
          <label class="os-label" for="filtro-fornecedor">Fornecedor:</label>
          <select id="filtro-fornecedor" class="os-select"></select>
        </div>

        <div class="os-form-group" style="margin-bottom: 0; flex: 1; min-width: 250px;">
          <label class="os-label" for="filtro-palavra">&nbsp;</label>
          <input id="filtro-palavra" class="os-input" type="text" placeholder="Buscar por código, descrição...">
        </div>

        <div class="actions" style="display: flex; gap: var(--os-space-2);">
          <button id="btn-limpar" class="os-btn os-btn-secondary" type="button">Limpar</button>
          <button class="os-btn os-btn-primary" id="btn-adicionar-selecionados">Adicionar selecionados</button>
          <button class="os-btn os-btn-ghost" id="btn-cancelar">Cancelar</button>
        </div>
      </div>
    </section>

    <section class="os-card">
      <div class="os-table-wrap">
        <h2 class="os-section-title" style="margin-left: var(--os-space-3); margin-top: var(--os-space-2);">Produtos
          Disponíveis</h2>
        <table id="tabela_produtos" class="os-table">
          <thead>
            <tr>
              <th class="center" style="width:72px">Sel.</th>
              <th style="min-width:110px">Código</th>
              <th style="min-width:320px">Descrição</th>
              <th style="min-width:120px">Embalagem</th>
              <th class="right" style="min-width:120px">Peso Líquido</th>
              <th class="right" style="min-width:110px">Valor</th>
            </tr>
          </thead>
          <tbody id="tabela-produtos-body"></tbody>
        </table>
      </div>

      <!-- Paginação -->
      <div class="paginacao"
        style="display:flex; gap:12px; align-items:center; margin-top:var(--os-space-4); justify-content: center; padding-bottom: var(--os-space-2);">
        <label class="os-label" style="display: flex; align-items: center; gap: 8px; margin-bottom: 0;">Itens por
          página:
          <select id="page_size" class="os-select" style="width: auto;">
            <option>10</option>
            <option selected>20</option>
            <option>30</option>
            <option>60</option>
          </select>
        </label>
        <button type="button" class="os-btn os-btn-secondary" id="btn-prev" onclick="gotoPrevPage()">◀ Anterior</button>
        <span id="pagina-info" style="font-weight: 500;"></span>
        <button type="button" class="os-btn os-btn-secondary" id="btn-next" onclick="gotoNextPage()">Próxima ▶</button>
      </div>
    </section>

  </div>

  <script src="tabela_preco.js"></script>
  <script>
    const menuButton = document.getElementById("menu-button");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    menuButton.addEventListener("click", () => {
      sidebar.classList.toggle("active");
      overlay.classList.toggle("active");
    });
    overlay.addEventListener("click", () => {
      sidebar.classList.remove("active");
      overlay.classList.remove("active");
    });
  </script>
</body>

</html>
