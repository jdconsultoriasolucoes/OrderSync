<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pedidos  OrderSync</title>

  <!-- Design System -->
  <link rel="stylesheet" href="../design-system.css" />

  <!-- Page-specific -->
  <link rel="stylesheet" href="pedido.css" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="../js/config.js"></script>
</head>

<body>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar_control.js"></script>
  <script>
    if (window.Auth) { window.Auth.checkAuth(); }
  </script>

  <!-- ========== HEADER ========== -->
  <header class="os-header">
    <button class="os-menu-btn" id="menu-button" aria-label="Menu">&#9776;</button>
    <img src="../logo.png" alt="Logo" class="os-logo" />
    <span class="os-header-title">Pedidos</span>
  </header>

  <!-- ========== SIDEBAR ========== -->
  <nav class="os-sidebar" id="sidebar">
    <div class="os-sidebar-section">Menu</div>
    <ul>
      <li><a href="../../index.html">Home</a></li>
      <li><a href="../clientes/cliente.html">Clientes</a></li>
      <li><a href="../gerenciar_tabelas/gerenciar_tabelas.html">Atualizar Catálogo</a></li>
      <li><a href="../pedido/pedido.html" class="active">Consultar Pedidos</a></li>
      <li><a href="../tabela_preco/criacao_tabela_preco.html">Tabela Preço</a></li>
      <li><a href="../produto/produto.html">Produtos</a></li>
    </ul>
    <div class="os-sidebar-section">Sistema</div>
    <ul>
      <li><a href="../usuarios.html">Usuários</a></li>
      <li><a href="../config_email/config_email.html">Configuração E-mail</a></li>
      <li><a href="#" onclick="window.Auth.openChangePasswordModal()">Trocar Senha</a></li>
      <li><a href="#" onclick="window.Auth.logout()">Sair</a></li>
    </ul>
  </nav>
  <div class="os-sidebar-overlay" id="overlay"></div>

  <!-- ========== MAIN ========== -->
  <div class="orc-card" style=" padding-top: var(--os-header-height);">
    <!-- Header with Title and Actions -->
    <div class="orc-header">
      <div
        style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem;">
        <div class="d-flex gap-2 flex-wrap">
          <button id="btnToggleFilters" class="os-btn os-btn-secondary os-btn-sm"
            title="Mostrar/Ocultar Filtros">&#x1F50D; Filtros</button>
          <button id="btnExport" class="os-btn os-btn-secondary os-btn-sm" title="Exportar para Excel/CSV">&#x1F4CA;
            Exportar</button>
          <button id="btnRefresh" class="os-btn os-btn-secondary os-btn-sm" title="Atualizar Lista">&#x1F504;
            Atualizar</button>
          <button id="btnLimpar" class="os-btn os-btn-ghost os-btn-sm" title="Limpar Filtros">&#x2716; Limpar</button>
        </div>
      </div>

      <!-- Collapsible Filters Grid -->
      <div id="filtersArea" class="filters-collapsible">
        <div class="custom-grid">
          <div>
            <label>Data Início:</label>
            <input type="date" id="fFrom">
          </div>
          <div>
            <label>Data Fim:</label>
            <input type="date" id="fTo">
          </div>
          <div>
            <label for="fPeriodoRapido">Período:</label>
            <select id="fPeriodoRapido">
              <option value="custom">Personalizado</option>
              <option value="7">Últimos 7 dias</option>
              <option value="15">Últimos 15 dias</option>
              <option value="30" selected>Últimos 30 dias</option>
              <option value="60">Últimos 60 dias</option>
              <option value="90">Últimos 90 dias</option>
            </select>
          </div>
          <div>
            <label>Status:</label>
            <select id="fStatus" class="form-select form-select-sm"></select>
          </div>
          <div>
            <label>Tabela:</label>
            <input type="text" id="fTabela" placeholder="Nome da tabela">
          </div>
          <div>
            <label>Cliente:</label>
            <input type="text" id="fCliente" placeholder="Nome ou código">
          </div>
          <div>
            <label>Fornecedor:</label>
            <input type="text" id="fFornecedor" placeholder="Fornecedor">
          </div>
        </div>
      </div>
    </div>

    <div class="table-wrap">
      <table class="orc-table" id="tblPedidos">
        <thead>
          <tr>
            <th data-sort="data_pedido" class="sortable">Data</th>
            <th data-sort="numero_pedido" class="sortable">Num. Pedido</th>
            <th data-sort="cliente_nome" class="sortable">Cliente</th>
            <th data-sort="modalidade" class="sortable">Entrega/Retirada</th>
            <th data-sort="valor_total" class="sortable tar">Valor</th>
            <th data-sort="status_codigo" class="sortable">Status</th>
            <th data-sort="tabela_preco_nome" class="sortable">Tabela</th>
            <th data-sort="fornecedor" class="sortable">Fornecedor</th>
            <th class="tar">Link</th>
            <th class="tar">Ações</th>
          </tr>
        </thead>
        <tbody id="tblBody"></tbody>
      </table>
      <div class="pagination">
        <button id="prevPage">&#x276E;</button>
        <span id="pageInfo">1</span>
        <button id="nextPage">&#x276F;</button>
      </div>
    </div>
  </div>

  <!-- Drawer -->
  <aside id="drawer" class="drawer hidden">
    <div class="drawer-head">
      <h2>Resumo do Pedido</h2>
      <button id="btnCloseDrawer">&#x2715;</button>
    </div>
    <div id="drawerContent" class="drawer-content"></div>
    <div id="drawerActions" class="drawer-actions"></div>
  </aside>

  <script src="pedido.js"></script>
  <script>
    const btnToggleFilters = document.getElementById('btnToggleFilters');
    const filtersArea = document.getElementById('filtersArea');
    if (btnToggleFilters && filtersArea) {
      btnToggleFilters.addEventListener('click', () => {
        if (filtersArea.style.display === 'none') {
          filtersArea.style.display = 'block';
          btnToggleFilters.innerHTML = '&#x1F50D; Ocultar Filtros';
        } else {
          filtersArea.style.display = 'none';
          btnToggleFilters.innerHTML = '&#x1F50D; Mostrar Filtros';
        }
      });
    }
  </script>
</body>

</html>
