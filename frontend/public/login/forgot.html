<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderSync — Recuperar Senha</title>
    <link rel="stylesheet" href="../design-system.css">
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="os-login-page">
    <div class="os-login-card">
        <img src="../logo.png" alt="OrderSync" class="os-login-logo" />
        <h2>Recuperar Senha</h2>
        <p class="os-login-subtitle">Informe seu e-mail para receber o link de redefiniçăo.</p>

        <form id="forgot-form" class="os-login-form">
            <div class="os-form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <button type="submit" class="os-login-btn" id="btn-submit">Enviar Link</button>
        </form>

        <div id="msg-box" class="os-msg-box"></div>

        <a href="login.html" class="os-back-link">? Voltar para Login</a>
    </div>

    <script src="../js/config.js"></script>
    <script>
        const API_URL = window.API_BASE || "http://127.0.0.1:8000";

        document.getElementById("forgot-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const btn = document.getElementById("btn-submit");
            const msgBox = document.getElementById("msg-box");

            btn.disabled = true;
            btn.innerText = "Enviando...";
            msgBox.style.display = "none";

            try {
                const response = await fetch(`${API_URL}/token/forgot-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                if (response.ok) {
                    msgBox.className = "os-msg-box success";
                    msgBox.innerText = "Se o e-mail estiver cadastrado, vocę receberá um link em instantes.";
                    msgBox.style.display = "block";
                } else {
                    throw new Error("Erro ao processar solicitaçăo.");
                }

            } catch (err) {
                msgBox.className = "os-msg-box error";
                msgBox.innerText = "Ocorreu um erro ao tentar enviar o e-mail. Tente novamente.";
                msgBox.style.display = "block";
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = "Enviar Link";
            }
        });
    </script>
</body>

</html>
