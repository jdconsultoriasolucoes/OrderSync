<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Clientes — OrderSync</title>

    <!-- Design System -->
    <link rel="stylesheet" href="../design-system.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/sidebar_control.js"></script>
</head>

<body>

    <script>
        if (window.Auth) {
            window.Auth.checkAuth();
        }
    </script>

    <!-- ========== HEADER ========== -->
    <header class="os-header">
        <button class="os-menu-btn" id="menu-button" aria-label="Menu">&#9776;</button>
        <img src="logo.png" alt="Logo" class="os-logo" />
        <span class="os-header-title">Lista de Clientes</span>
    </header>

    <!-- ========== SIDEBAR ========== -->
    <nav class="os-sidebar" id="sidebar">
        <div class="os-sidebar-section">Menu</div>
        <ul>
            <li><a href="../../index.html">Home</a></li>
            <li><a href="../clientes/cliente.html" class="active">Clientes</a></li>
            <li><a href="../gerenciar_tabelas/gerenciar_tabelas.html">Atualizar Catálogo</a></li>
            <li><a href="../pedido/pedido.html">Consultar Pedidos</a></li>
            <li><a href="../tabela_preco/criacao_tabela_preco.html">Tabela Preço</a></li>
            <li><a href="../produto/produto.html">Produtos</a></li>
        </ul>
        <div class="os-sidebar-section">Sistema</div>
        <ul>
            <li><a href="../usuarios.html">Usuários</a></li>
            <li><a href="../config_email/config_email.html">Configuração E-mail</a></li>
            <li><a href="#" onclick="window.Auth.openChangePasswordModal()">Trocar Senha</a></li>
            <li><a href="#" onclick="window.Auth.logout()">Sair</a></li>
        </ul>
    </nav>
    <div class="os-sidebar-overlay" id="overlay"></div>

    <!-- ========== MAIN ========== -->
    <div class="os-page-container"
        style="padding: var(--os-space-4); padding-top: calc(var(--os-header-height) + var(--os-space-4));">
        <section class="os-card">
            <div class="os-card-header">
                <h3 class="os-card-title">Clientes Cadastrados</h3>
            </div>

            <!-- Toolbar -->
            <div class="os-toolbar" style="margin-bottom: var(--os-space-4); display: flex; gap: var(--os-space-2);">
                <div class="search" style="flex: 1; max-width: 400px;">
                    <input type="text" id="filtro" class="os-input"
                        placeholder="Pesquisar por nome, CPF, CNPJ, email, estado ou ID...">
                </div>
                <div class="actions">
                    <button class="os-btn os-btn-secondary" onclick="voltarParaCadastro()">Voltar ao Cadastro</button>
                </div>
            </div>

            <div class="os-table-wrap">
                <table id="tabela-clientes" class="os-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>CNPJ</th>
                            <th>Email</th>
                            <th>Estado</th>
                            <th>Ativo</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <!-- Controles de Paginação -->
            <div id="pagination-controls" class="pagination-container"
                style="display: flex; justify-content: center; align-items: center; gap: var(--os-space-2); margin-top: var(--os-space-4);">
                <button id="btn-prev" class="os-btn os-btn-secondary" onclick="prevPage()" disabled>Anterior</button>
                <span id="page-info" style="font-weight: 500;">Página 1</span>
                <button id="btn-next" class="os-btn os-btn-secondary" onclick="nextPage()" disabled>Próxima</button>
            </div>
        </section>
    </div>

    <script>
        let clientes = [];
        let filtrados = [];
        let currentPage = 1;
        const itemsPerPage = 20;

        // Carrega os clientes do backend
        const token = localStorage.getItem('ordersync_token');
        const api = window.API_BASE || "http://127.0.0.1:8000";

        axios.get(`${api}/cliente`, {
            headers: { 'Authorization': `Bearer ${token}` }
        })
            .then(res => {
                clientes = res.data;
                filtrados = [...clientes];
                renderizarTabela();
            })
            .catch(error => {
                alert(`Erro ao buscar clientes: ${error.message || error}`);
                console.error(error);
            });

        function renderizarTabela() {
            const tbody = document.querySelector("#tabela-clientes tbody");
            tbody.innerHTML = "";

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginaAtualClientes = filtrados.slice(startIndex, endIndex);

            paginaAtualClientes.forEach(cliente => {
                const tr = document.createElement("tr");

                const btn = document.createElement("button");
                btn.textContent = "Selecionar";
                btn.className = "os-btn os-btn-primary os-btn-sm";
                btn.addEventListener("click", () => selecionarCliente(cliente));

                tr.innerHTML = `
          <td>${cliente.cadastrocliente?.id || ''}</td>
          <td>${cliente.cadastrocliente?.nome_cliente || ''}</td>
          <td>${cliente.cadastrocliente?.cpf || ''}</td>
          <td>${cliente.cadastrocliente?.cnpj || ''}</td>
          <td>${cliente.responsavel_compras?.email_resposavel || ''}</td>
          <td>${cliente.endereco_entrega?.estado_EnderecoEntrega || ''}</td>
          <td><span class="os-badge ${cliente.cadastrocliente?.ativo ? 'os-badge-success' : 'os-badge-error'}">${cliente.cadastrocliente?.ativo ? 'Sim' : 'Não'}</span></td>
        `;

                const tdBtn = document.createElement("td");
                tdBtn.appendChild(btn);
                tr.appendChild(tdBtn);
                tbody.appendChild(tr);
            });

            atualizarBotoesPaginacao();
        }

        function atualizarBotoesPaginacao() {
            const btnPrev = document.getElementById("btn-prev");
            const btnNext = document.getElementById("btn-next");
            const pageInfo = document.getElementById("page-info");

            const totalPages = Math.ceil(filtrados.length / itemsPerPage) || 1;

            pageInfo.textContent = `Página ${currentPage} de ${totalPages}`;
            btnPrev.disabled = currentPage === 1;
            btnNext.disabled = currentPage === totalPages;
        }

        function nextPage() {
            const totalPages = Math.ceil(filtrados.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderizarTabela();
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderizarTabela();
            }
        }

        function voltarParaCadastro() {
            localStorage.removeItem('Ordersync_ClienteSelecionadoIdListar'); // ensure clear state
            window.location.href = "cliente.html";
        }

        function selecionarCliente(cliente) {
            if (cliente && cliente.cadastrocliente && cliente.cadastrocliente.id) {
                // Saving the selected client ID into local storage to intercept it automatically in the form screen
                localStorage.setItem('Ordersync_ClienteSelecionadoIdListar', cliente.cadastrocliente.id);
                window.location.href = "cliente.html";
            } else {
                alert("Erro: Este cliente não possui um ID válido.");
            }
        }

        // Filtro ao digitar
        document.getElementById("filtro").addEventListener("input", function () {
            const termo = this.value.toLowerCase().trim();

            filtrados = clientes.filter(c => {
                const id = String(c.cadastrocliente?.id || '');
                const codigo = String(c.cadastrocliente?.codigo_da_empresa || '').toLowerCase(); // Novo
                const nome = c.cadastrocliente?.nome_cliente?.toLowerCase() || '';
                const fantasia = c.cadastrocliente?.nome_fantasia?.toLowerCase() || ''; // Novo
                const cpf = (c.cadastrocliente?.cpf || '').replace(/\D/g, ''); // Somente números
                const cnpj = (c.cadastrocliente?.cnpj || '').replace(/\D/g, ''); // Somente números
                const email = c.responsavel_compras?.email_resposavel?.toLowerCase() || '';
                const uf = c.endereco_entrega?.estado_EnderecoEntrega?.toLowerCase() || '';

                // Termo limpo para comparação numérica
                const termoNumerico = termo.replace(/\D/g, '');

                return (
                    id.includes(termo) ||
                    codigo.includes(termo) ||
                    nome.includes(termo) ||
                    fantasia.includes(termo) ||
                    email.includes(termo) ||
                    uf.includes(termo) ||
                    (termoNumerico && (cpf.includes(termoNumerico) || cnpj.includes(termoNumerico)))
                );
            });

            currentPage = 1; // Reseta a página após aplicar o filtro
            renderizarTabela();
        });
    </script>
</body>

</html>
