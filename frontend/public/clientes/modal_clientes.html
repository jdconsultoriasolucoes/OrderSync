<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>Lista de Clientes — OrderSync</title>

  <!-- Design System -->
  <link rel="stylesheet" href="../design-system.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="../js/config.js"></script>
</head>

<body style="background: var(--os-bg); padding: var(--os-space-4);">
  <div class="os-page-container" style="max-width: 900px; margin: 0 auto; ">
    <section class="os-card">
      <div class="os-card-header">
        <h3 class="os-card-title">Clientes Cadastrados</h3>
      </div>

      <div class="os-toolbar" style="margin-bottom: var(--os-space-4);">
        <div class="search" style="flex: 1;">
          <input type="text" id="filtro" class="os-input"
            placeholder="Pesquisar por nome, CPF, CNPJ, email, estado ou ID...">
        </div>
      </div>

      <div class="os-table-wrap">
        <table id="tabela-clientes" class="os-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>CPF</th>
              <th>CNPJ</th>
              <th>Email</th>
              <th>Estado</th>
              <th>Ativo</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    let clientes = [];

    // Carrega os clientes do backend
    const token = localStorage.getItem('ordersync_token');
    const api = window.API_BASE || "http://127.0.0.1:8000";

    axios.get(`${api}/cliente`, {
      headers: { 'Authorization': `Bearer ${token}` }
    })
      .then(res => {
        clientes = res.data;
        renderizarTabela(clientes);
      })
      .catch(error => {
        alert(`Erro ao buscar clientes: ${error.message || error}`);
        console.error(error);
      });

    function renderizarTabela(lista) {
      const tbody = document.querySelector("#tabela-clientes tbody");
      tbody.innerHTML = "";

      lista.forEach(cliente => {
        const tr = document.createElement("tr");

        const btn = document.createElement("button");
        btn.textContent = "Selecionar";
        btn.className = "os-btn os-btn-primary os-btn-sm";
        btn.addEventListener("click", () => selecionarCliente(cliente));

        tr.innerHTML = `
          <td>${cliente.cadastrocliente?.id || ''}</td>
          <td>${cliente.cadastrocliente?.nome_cliente || ''}</td>
          <td>${cliente.cadastrocliente?.cpf || ''}</td>
          <td>${cliente.cadastrocliente?.cnpj || ''}</td>
          <td>${cliente.responsavel_compras?.email_resposavel || ''}</td>
          <td>${cliente.endereco_entrega?.estado_EnderecoEntrega || ''}</td>
          <td><span class="os-badge ${cliente.cadastrocliente?.ativo ? 'os-badge-success' : 'os-badge-error'}">${cliente.cadastrocliente?.ativo ? 'Sim' : 'Não'}</span></td>
        `;

        const tdBtn = document.createElement("td");
        tdBtn.appendChild(btn);
        tr.appendChild(tdBtn);
        tbody.appendChild(tr);
      });
    }

    function selecionarCliente(cliente) {
      try {
        if (window.opener && typeof window.opener.preencherFormulario === "function") {
          window.opener.preencherFormulario(cliente);
        } else {
          alert("Não foi possível comunicar com a janela principal.");
        }
      } catch (e) {
        console.error("Erro ao selecionar cliente:", e);
      } finally {
        window.close();
      }
    }

    // Filtro ao digitar
    document.getElementById("filtro").addEventListener("input", function () {
      const termo = this.value.toLowerCase().trim();
      const ehNumero = /^[0-9]/.test(termo);

      const filtrados = clientes.filter(c => {
        const id = String(c.cadastrocliente?.id || '');
        const codigo = String(c.cadastrocliente?.codigo_da_empresa || '').toLowerCase(); // Novo
        const nome = c.cadastrocliente?.nome_cliente?.toLowerCase() || '';
        const fantasia = c.cadastrocliente?.nome_fantasia?.toLowerCase() || ''; // Novo
        const cpf = (c.cadastrocliente?.cpf || '').replace(/\D/g, ''); // Somente números
        const cnpj = (c.cadastrocliente?.cnpj || '').replace(/\D/g, ''); // Somente números
        const email = c.responsavel_compras?.email_resposavel?.toLowerCase() || '';
        const uf = c.endereco_entrega?.estado_EnderecoEntrega?.toLowerCase() || '';

        // Termo limpo para comparação numérica
        const termoNumerico = termo.replace(/\D/g, '');

        return (
          id.includes(termo) ||
          codigo.includes(termo) ||
          nome.includes(termo) ||
          fantasia.includes(termo) ||
          email.includes(termo) ||
          uf.includes(termo) ||
          (termoNumerico && (cpf.includes(termoNumerico) || cnpj.includes(termoNumerico)))
        );
      });

      renderizarTabela(filtrados);
    });
  </script>
</body>

</html>
